<!DOCTYPE html>
<html>
<head><title>Torn Tools Hub</title>
    <style> body {
        margin: 0;
        font-family: Arial, Helvetica, sans-serif;
        background: #0f1115;
        color: #e4e6eb;
    }

    header {
        background: #1b1f26;
        padding: 30px;
        text-align: center;
        border-bottom: 1px solid #2a2f3a;
    }

    header h1 {
        margin: 0;
        color: #8ab4ff;
    }

    header p {
        color: #9aa4b2;
    }

    .container {
        max-width: 1000px;
        margin: auto;
        padding: 40px;
    }

    .grid {
        display: grid;
        grid-template-columns:repeat(auto-fit, minmax(250px, 1fr));
        gap: 25px;
    }

    .card {
        background: #1b1f26;
        padding: 25px;
        border-radius: 10px;
        border: 1px solid #2a2f3a;
        transition: 0.2s;
    }

    .card:hover {
        transform: translateY(-4px);
        border-color: #7bd389;
    }

    .card h2 {
        margin-top: 0;
        color: #7bd389;
    }

    .card p {
        color: #b0b7c3;
    }

    .card a {
        display: inline-block;
        margin-top: 15px;
        padding: 10px 16px;
        background: #7bd389;
        color: black;
        text-decoration: none;
        border-radius: 6px;
        font-weight: bold;
    }

    .card a:hover {
        background: #69c17a;
    }

    footer {
        text-align: center;
        padding: 30px;
        color: #7a8391;
    } </style>
</head>
<body>
<header><h1>Torn Tools</h1>
    <p>A collection of tools and simulators for Torn players</p></header>
<div class="container">
    <div class="grid">
        <div class="card"><h2>Armor Simulator</h2>
            <p>Compare armor value and coverage to determine which chest armor reduces the most damage.</p> <a
                    href="torn-armor-simulator.html">Open Tool</a></div>
<!--
        <div class="card"><h2>Future Tool</h2>
            <p>More Torn analysis tools coming soon.</p> <a href="#">Coming Soon</a></div>
        <div class="card"><h2>Future Tool</h2>
            <p>Additional simulators and combat analysis tools will appear here.</p> <a href="#">Coming Soon</a></div>
-->
    </div>
</div>
<footer> Created for the Torn community</footer>
</body>
</html>
